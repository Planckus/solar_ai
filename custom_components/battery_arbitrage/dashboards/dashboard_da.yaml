title: Solar AI
views:
- title: Solar AI
  path: hjem
  icon: mdi:home
  panel: true
  cards:
  - type: custom:solar-ai-view-card
    cards:
    - type: custom:solar-ai-status-card
      mode_entity: sensor.battery_arbitrage_driftstilstand
      mode_reason_entity: sensor.battery_arbitrage_begrundelse_for_tilstand
      enabled_entity: switch.battery_arbitrage_arbitrage_aktiv
      house_load_entity: sensor.foxessmodbus_load_power
      solar_entity: sensor.pv_power_foxessmodbus
      battery_charge_entity: sensor.foxessmodbus_battery_charge
      battery_discharge_entity: sensor.foxessmodbus_battery_discharge
      battery_soc_entity: sensor.foxessmodbus_battery_soc_1
      battery_floor_entity: sensor.solar_ai_effektivt_afladningsgulv
      grid_import_entity: sensor.foxessmodbus_grid_consumption
      grid_export_entity: sensor.foxessmodbus_feed_in
      ev_power_entity: sensor.solar_ai_lader_effekt
      ev_status_entity: sensor.solar_ai_ev_status
      buy_price_entity: sensor.solar_ai_indkobspris_opdeling
      sell_price_entity: sensor.battery_arbitrage_eksportpris
      savings_today_entity: sensor.solar_ai_samlet_besparelse_i_dag
      solar_forecast_entity: sensor.solar_ai_solcelleprognose_48t_graf
      solar_actual_today_entity: sensor.foxessmodbus_solar_energy_today
      prices_navigate_path: /battery-arbitrage/priser
    - type: custom:solar-ai-mode-picker-card
      title: Opladningstilstand
      entity: select.solar_ai_ev_opladningstilstand
    - type: custom:solar-ai-entities-card
      title: Solcelleprognose nøjagtighed
      icon_color: amber
      show_header_toggle: false
      entities:
      - entity: sensor.solar_ai_solcelleprognose_fejl_nu
        name: Live solar-korrektion
    - type: custom:solar-ai-chart-card
      title: Priser (24t)
      icon: mdi:currency-eur
      icon_color: amber
      height: 180
      x_type: hour_offset
      unit: kr
      series:
      - entity: sensor.solar_ai_24h_priskort
        path: slots
        x: h
        y: buy
        type: line
        curve: step
        color: var(--error-color)
        name: Køb
      - entity: sensor.solar_ai_24h_priskort
        path: slots
        x: h
        y: sell
        type: line
        curve: step
        color: var(--success-color)
        name: Salg
    - type: custom:solar-ai-chart-card
      title: Solcelleprognose (48t)
      icon: mdi:weather-partly-cloudy
      icon_color: amber
      height: 220
      x_type: timestamp
      unit: kW
      now_marker: true
      series:
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: raw_kw
        type: bar
        color: '#b0bec580'
        name: Råt forecast (Solcast)
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: adj_kw
        type: line
        curve: smooth
        color: var(--warning-color)
        name: Justeret
    - type: custom:solar-ai-nav-card
      items:
      - icon: mdi:car-electric
        icon_color: blue
        label: EV
        path: /battery-arbitrage/ev
      - icon: mdi:currency-eur
        icon_color: amber
        label: Priser
        path: /battery-arbitrage/priser
      - icon: mdi:chart-timeline-variant
        icon_color: purple
        label: Historik
        path: /battery-arbitrage/historik
      - icon: mdi:cog
        icon_color: cyan
        label: Indstillinger
        path: /battery-arbitrage/indstillinger
      - icon: mdi:format-list-bulleted-square
        icon_color: green
        label: Logs
        path: /battery-arbitrage/logs
      - icon: mdi:tune-variant
        icon_color: blue-grey
        label: Avanceret
        path: /battery-arbitrage/avanceret
- title: EV
  path: ev
  icon: mdi:car-electric
  subview: true
  panel: true
  cards:
  - type: custom:solar-ai-view-card
    cards:
    - type: conditional
      conditions:
      - condition: state
        entity: binary_sensor.solar_ai_eksport_stop_aktiv
        state: 'on'
      card:
        type: markdown
        content: '## 🛑 Eksport-stop aktiv

          {% set since = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''since'') %}{% set floor = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''floor'') %}{% set price = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''price_at_start'') | float(0) %}Salgsprisen er under gulvet ({% if floor is not none %}{{ ''%.2f'' | format(floor) }}{% else %}–{% endif %} DKK/kWh). Solcelle-eksport er blokeret.{% if price %} Pris ved start: {{ ''%.3f'' | format(price) }} DKK/kWh.{% endif %}{% if since %} Aktiv siden {{ since[11:16] }}.{% endif %}'
    - type: custom:solar-ai-mode-picker-card
      title: EV-opladningstilstand
      entity: select.solar_ai_ev_opladningstilstand
    - type: custom:solar-ai-status-card
      mode_entity: sensor.battery_arbitrage_driftstilstand
      mode_reason_entity: sensor.battery_arbitrage_begrundelse_for_tilstand
      enabled_entity: switch.battery_arbitrage_arbitrage_aktiv
      house_load_entity: sensor.foxessmodbus_load_power
      solar_entity: sensor.pv_power_foxessmodbus
      battery_charge_entity: sensor.foxessmodbus_battery_charge
      battery_discharge_entity: sensor.foxessmodbus_battery_discharge
      battery_soc_entity: sensor.foxessmodbus_battery_soc_1
      battery_floor_entity: sensor.solar_ai_effektivt_afladningsgulv
      grid_import_entity: sensor.foxessmodbus_grid_consumption
      grid_export_entity: sensor.foxessmodbus_feed_in
      ev_power_entity: sensor.solar_ai_lader_effekt
      ev_status_entity: sensor.solar_ai_ev_status
      buy_price_entity: sensor.solar_ai_indkobspris_opdeling
      sell_price_entity: sensor.battery_arbitrage_eksportpris
      savings_today_entity: sensor.solar_ai_samlet_besparelse_i_dag
      solar_forecast_entity: sensor.solar_ai_solcelleprognose_48t_graf
      solar_actual_today_entity: sensor.foxessmodbus_solar_energy_today
      prices_navigate_path: /battery-arbitrage/priser
    - type: markdown
      content: '### Indstillinger'
    - type: custom:solar-ai-entities-card
      icon: mdi:tune
      icon_color: blue
      show_header_toggle: false
      entities:
      - entity: select.solar_ai_ev_minimum_opladningshastighed
        name: Minimum opladning
        icon: mdi:battery-charging-low
        help: Laveste effekt bilen oplader med, når den overhovedet lader. De fleste biler kan ikke lade under ca. 6 A — sæt ikke lavere end din bils egen grænse.
      - entity: select.solar_ai_ev_maksimum_opladningshastighed
        name: Maksimum opladning
        icon: mdi:battery-charging-high
        help: Højeste effekt bilen må trække, uanset hvor meget solstrøm eller net-kapacitet der er til rådighed.
      - entity: number.solar_ai_batteri_forst_taerskel_ev_venter_til_husbatteriet_nar_dette_niveau
        name: Batteri-først tærskel (%)
        icon: mdi:battery-arrow-up
        help: I ren solcelle-tilstand venter EV'en med at lade, indtil husbatteriet har nået denne SoC — medmindre der allerede eksporteres overskudsstrøm til nettet.
      - entity: number.solar_ai_trefaset_skift_taerskel_kw
        name: Trefaset skift-tærskel (kW)
        icon: mdi:sine-wave
        help: Solcelle-overskud skal nå denne værdi, før laderen skifter fra 1-faset til 3-faset opladning.
      - entity: number.solar_ai_faseudjaevnings_vindue_min
        name: Faseudjævnings-vindue (min)
        icon: mdi:chart-bell-curve
        help: Hvor mange minutters glidende gennemsnit af solcelle-overskuddet der bruges til fase-beslutningen — dæmper skift ved forbipasserende skyer.
      - entity: select.solar_ai_stromtrin_opladning
        name: Strømtrin (opladning)
        icon: mdi:current-ac
        help: Hvor finkornet laderens strømstyrke justeres i trit med solcelle-overskuddet (f.eks. 1 A ad gangen, eller finere trin på understøttet hardware).
      - entity: number.solar_ai_faseskift_interval_min
        name: Faseskift-interval (min)
        icon: mdi:timer-sync-outline
        help: Hvor længe lavt overskud skal vare, før laderen falder tilbage til 1-faset — forhindrer hurtige frem-og-tilbage-skift.
      - entity: number.solar_ai_override_rampe_trin_s
        name: Override rampe-trin (s)
        icon: mdi:speedometer
        help: Hvor ofte strømstyrken øges et trin, når systemet aktivt forsøger at høste ellers spildt solcelle-overskud (batteriet fuldt + salg blokeret).
      - entity: number.solar_ai_overskuds_rampetrin_a_maks_stigning_pr_kontrol_tick_lavere_jaevnere_mindre_midlertidigt_nettraek
        name: Overskuds-rampetrin (A)
        icon: mdi:trending-up
        help: 'Hvor mange ampere EV''ens normale (ikke-override) mål må stige med pr. kontrol-tick (~10 sek). Kun stigninger begrænses — fald sker altid med det samme. Lavere værdi = jævnere, mindre midlertidigt nettræk når solen eller batteriet skifter hurtigt; højere værdi = griber et nyt overskud hurtigere, men kan af og til løbe fra hvad batteri/net kan følge med til i et par sekunder.'
      - entity: select.solar_ai_standard_ev_tilstand_ved_tilslutning
        name: Standard tilstand ved tilslutning
        icon: mdi:car-connected
        help: Den EV-tilstand der automatisk vælges, hver gang bilen tilsluttes laderen.
    - type: markdown
      content: '### Lader-info'
    - type: markdown
      content: '{% set i = states.sensor.solar_ai_lader_info %}{% if i is none or i.state in [''unavailable'',''unknown'',''Unknown''] %}*Lader ikke tilsluttet endnu*{% else %}* Producent: **{{ i.attributes.vendor }}** · Model: **{{ i.attributes.model }}**

        * Firmware: {{ i.attributes.firmware }}

        * Sidst kontaktet: {{ i.attributes.seconds_since_seen }} sek siden{% endif %}'
    - type: custom:solar-ai-entities-card
      title: Solcelleprognose nøjagtighed
      icon_color: amber
      show_header_toggle: false
      entities:
      - entity: sensor.solar_ai_solcelleprognose_fejl_nu
        name: Live solar-korrektion
    - type: custom:solar-ai-chart-card
      title: Solcelleprognose (48t)
      icon: mdi:weather-partly-cloudy
      icon_color: amber
      height: 220
      x_type: timestamp
      unit: kW
      now_marker: true
      series:
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: raw_kw
        type: bar
        color: '#b0bec580'
        name: Råt forecast (Solcast)
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: adj_kw
        type: line
        curve: smooth
        color: var(--warning-color)
        name: Justeret
    - type: conditional
      conditions:
      - condition: state
        entity: select.solar_ai_ev_opladningstilstand
        state_not: scheduled
      card:
        type: markdown
        content: '## ⚠️ Skemaer er inaktive lige nu

          Skemaerne styrer kun opladningen når EV-tilstand er "Planlagt". Aktuel tilstand: {{ states(''sensor.solar_ai_ev_aktuel_tilstand'') }}. Ændringer her påvirker ikke den aktive opladning — vælg "Planlagt" ovenfor for at bruge skemaerne.'
    - type: markdown
      content: '### Planlagt opladning

        4 skemaer. Aktiver et eller flere og sæt EV-tilstand til "Planlagt" for at bruge dem.'
    - type: markdown
      content: '{% set slots = [1, 2, 3, 4] %}

        | # | Aktiv | Tilstand | Start | Slut |

        |:-:|:-----:|:---------|:------|:-----|

        {% for n in slots %}{% set enabled = is_state(''switch.solar_ai_skema_'' ~ n ~ ''_aktiveret'', ''on'') %}{% set mode = states(''select.solar_ai_skema_'' ~ n ~ ''_tilstand'') %}{% set start = states(''time.solar_ai_skema_'' ~ n ~ ''_starttid'') %}{% set end = states(''time.solar_ai_skema_'' ~ n ~ ''_sluttid'') %}{% set mark = ''✅'' if enabled else ''⛔'' %}

        | {{ n }} | {{ mark }} | {{ mode }} | {{ start[:5] }} | {{ end[:5] }} |{% endfor %}'
