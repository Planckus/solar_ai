        content: '{% set sessions = state_attr(''sensor.solar_ai_sessionslog'', ''sessions'') | default([]) %}

          {% if sessions %}

          **{{ sessions | length }} af {{ states(''sensor.solar_ai_sessionslog'') }} sessioner** (nyeste først)


          | Start | Slut | Type | SoC | Varighed | kWh | DKK |

          |:------|:-----|:-----|:----|:---------|:----|:----|

