- title: Logs
  path: logs
  icon: mdi:format-list-bulleted-square
  subview: true
  panel: true
  cards:
  - type: custom:solar-ai-view-card
    cards:
    - type: vertical-stack
      cards:
      - type: markdown
        content: '<!-- 🚗 Lader sessions-historik -->

          ## 🚗 Lader sessions-historik


          {% set sessions = state_attr(''sensor.solar_ai_lader_sessions_log'', ''sessions'') or [] %}{% if sessions | length == 0 %}_Ingen afsluttede sessioner endnu. Når en bil tilsluttes og oplader,

          vises start- og sluttider, samt strømkilde-fordeling her._

          {% else %}| Start | Varighed | Total | ☀️ Sol | ⚡ Net |

          |---|---:|---:|---:|---:|

          {% for s in sessions %}| {{ as_datetime(s.start_ts).astimezone() | as_timestamp | timestamp_custom(''%a %d/%m %H:%M'', true) }} | {{ ''%.0f'' | format(s.duration_min) }} min | **{{ ''%.2f'' | format(s.energy_kwh) }} kWh** | {{ ''%.2f'' | format(s.energy_kwh_solar | default(0)) }} | {{ ''%.2f'' | format(s.energy_kwh_grid | default(0)) }} |

          {% endfor %}

          _Tider er lokal tid. Sol/net-fordelingen er integreret pr. tick fra live PV-overskud og kan afvige et par procent fra laderens totale meterværdi._{% endif %}'
      - type: markdown
        content: '## 📋 Logs


          Komplet historik for alle aktiviteter Solar AI har registreret. Hver log gemmer op til 500 entries; her vises de seneste 50.

          '
    - type: markdown
      title: 🔋 Sessionslog (eksport + netopladning)
      content: '{% set sessions = state_attr(''sensor.solar_ai_sessionslog'', ''sessions'') | default([]) %}

        {% if sessions %}

        **{{ sessions | length }} af {{ states(''sensor.solar_ai_sessionslog'') }} sessioner** (nyeste først)


        | Start | Slut | Type | SoC | Varighed | kWh | DKK |

        |:------|:-----|:-----|:----|:---------|:----|:----|

        {% for s in sessions[:50] %}{% set icon = ''💰'' if s.type == ''export'' else ''⚡'' %}{% set label = ''Eksport'' if s.type == ''export'' else ''Oplade'' %}

        | {{ s.start_ts[11:16] }} | {{ s.end_ts[11:16] }} | {{ icon }} {{ label }} | {{ s.soc_start | round(0) | int }}→{{ s.soc_end | round(0) | int }}% | {{ s.duration_min }} min | {{ s.kwh }} | {{ s.dkk }} |{% endfor %}

        {% else %}

        *Ingen sessioner registreret endnu.*


        Sessioner registreres når Solar AI aktivt skifter inverteren til **Feed-in First** (eksport) eller **Force Charge** (netopladning). Med hovedkontakten slået fra registreres ingen sessioner.

        {% endif %}'
    - type: markdown
      title: ☀️ Solgulv-blokeringer (lave priser)
      content: '{% set events = state_attr(''sensor.solar_ai_solgulv_log_blokering'', ''events'') | default([]) %}

        {% if events %}

        **{{ events | length }} af {{ states(''sensor.solar_ai_solgulv_log_blokering'') }} blokeringer** (nyeste først)


        | Start | Slut | Varighed | Pris start | Pris slut | Gulv |

        |:------|:-----|:---------|:-----------|:----------|:-----|

        {% for e in events[:50] %}

        | {{ e.start_ts[11:16] }} | {{ e.end_ts[11:16] }} | {{ e.duration_min }} min | {{ ''%.3f'' | format(e.price_at_start) }} | {{ ''%.3f'' | format(e.price_at_end) }} | {{ ''%.2f'' | format(e.floor) }} |{% endfor %}

        {% else %}

        *Ingen solgulv-blokeringer registreret endnu.*


        En blokering registreres når salgsprisen falder under det konfigurerede minimum (`Minimum eksportpris` på Indstillinger), og afsluttes når prisen stiger igen.

        {% endif %}'
