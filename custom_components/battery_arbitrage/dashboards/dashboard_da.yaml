title: Solar AI
views:
- title: Solar AI
  path: hjem
  icon: mdi:home
  panel: true
  cards:
  - type: custom:mod-card
    card_mod:
      style: ':host { max-width: 1000px; margin: 0 auto; display: block; }

        '
    card:
      type: vertical-stack
      cards:
      - type: horizontal-stack
        cards:
        - type: custom:mushroom-template-card
          primary: '{{ states(''sensor.battery_arbitrage_driftstilstand'') | title }}'
          secondary: '{{ states(''sensor.battery_arbitrage_begrundelse_for_tilstand'') }}'
          icon: mdi:sine-wave
          icon_color: amber
          multiline_secondary: true
          entity: sensor.battery_arbitrage_driftstilstand
          tap_action:
            action: more-info
          fill_container: true
        - type: custom:mushroom-entity-card
          entity: switch.battery_arbitrage_arbitrage_aktiv
          name: Solar AI
          icon: mdi:flash-auto
          icon_color: amber
          tap_action:
            action: toggle
          fill_container: true
      - type: horizontal-stack
        cards:
        - type: custom:mushroom-template-card
          primary: '{{ ''%.2f'' | format(states(''sensor.solar_ai_indkobspris_opdeling'') | float(0)) }} kr'
          secondary: Køb nu · DKK/kWh
          icon: mdi:flash
          icon_color: red
          entity: sensor.solar_ai_indkobspris_opdeling
          tap_action:
            action: navigate
            navigation_path: /battery-arbitrage/priser
          fill_container: true
        - type: custom:mushroom-template-card
          primary: '{{ ''%.2f'' | format(states(''sensor.battery_arbitrage_eksportpris'') | float(0)) }} kr'
          secondary: Salg nu · DKK/kWh
          icon: mdi:cash-fast
          icon_color: green
          entity: sensor.battery_arbitrage_eksportpris
          tap_action:
            action: navigate
            navigation_path: /battery-arbitrage/priser
          fill_container: true
      - type: custom:mushroom-template-card
        primary: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% set p = states(''sensor.solar_ai_lader_effekt'') | float(0) %}{% if s == ''Charging'' %}Oplader — {{ ''%.1f'' | format(p) }} kW{% elif s in [''Preparing'',''SuspendedEV'',''SuspendedEVSE'',''Finishing''] %}Bil tilsluttet{% elif s == ''Available'' %}Ingen bil{% else %}{{ s }}{% endif %}'
        secondary: '{% set en = state_attr(''sensor.solar_ai_ev_status'',''enabled'') %}{% set r = state_attr(''sensor.solar_ai_ev_status'',''reason'') %}{% if not en %}EV-styring slået fra{% else %}{{ r }}{% endif %}'
        icon: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% if s == ''Charging'' %}mdi:battery-charging{% elif s in [''Preparing'',''SuspendedEV'',''SuspendedEVSE'',''Finishing''] %}mdi:ev-plug-type2{% else %}mdi:car-electric-outline{% endif %}'
        icon_color: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% if s == ''Charging'' %}green{% elif s in [''Preparing'',''SuspendedEV'',''SuspendedEVSE'',''Finishing''] %}blue{% else %}grey{% endif %}'
        multiline_secondary: true
        entity: sensor.solar_ai_ev_status
        tap_action:
          action: more-info
        fill_container: true
      - type: custom:mushroom-title-card
        title: Charge mode
        card_mod:
          style: ':host { --title-padding: 8px 12px 0px; }

            .title { text-align: center; }

            '
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
        - type: template
          icon: mdi:lock
          content: Fra
          icon_color: '{{ ''blue'' if states(''select.solar_ai_ev_opladningstilstand'') == ''locked'' else ''grey'' }}'
          tap_action:
            action: call-service
            service: select.select_option
            data:
              option: locked
            target:
              entity_id: select.solar_ai_ev_opladningstilstand
        - type: template
          icon: mdi:weather-sunny
          content: Sol
          icon_color: '{{ ''blue'' if states(''select.solar_ai_ev_opladningstilstand'') == ''pv'' else ''grey'' }}'
          tap_action:
            action: call-service
            service: select.select_option
            data:
              option: pv
            target:
              entity_id: select.solar_ai_ev_opladningstilstand
        - type: template
          icon: mdi:weather-sunny-alert
          content: Sol+Bat
          icon_color: '{{ ''blue'' if states(''select.solar_ai_ev_opladningstilstand'') == ''pv_battery'' else ''grey'' }}'
          tap_action:
            action: call-service
            service: select.select_option
            data:
              option: pv_battery
            target:
              entity_id: select.solar_ai_ev_opladningstilstand
        - type: template
          icon: mdi:rocket-launch
          content: Hurtig
          icon_color: '{{ ''blue'' if states(''select.solar_ai_ev_opladningstilstand'') == ''full'' else ''grey'' }}'
          tap_action:
            action: call-service
            service: select.select_option
            data:
              option: full
            target:
              entity_id: select.solar_ai_ev_opladningstilstand
        - type: template
          icon: mdi:calendar-clock
          content: Planlagt
          icon_color: '{{ ''blue'' if states(''select.solar_ai_ev_opladningstilstand'') == ''scheduled'' else ''grey'' }}'
          tap_action:
            action: call-service
            service: select.select_option
            data:
              option: scheduled
            target:
              entity_id: select.solar_ai_ev_opladningstilstand
        card_mod:
          style: 'ha-card { --chip-height: 54px; --chip-font-size: 15px; --chip-icon-size: 22px; --chip-border-radius: 14px; --chip-spacing: 6px; }

            '
      - type: custom:power-flow-card-plus
        title: Energi-flow
        entities:
          grid:
            entity:
              consumption: sensor.foxessmodbus_grid_consumption
              production: sensor.foxessmodbus_feed_in
            name: Elnet
          solar:
            entity: sensor.pv_power_foxessmodbus
            name: Sol
          battery:
            entity:
              consumption: sensor.foxessmodbus_battery_discharge
              production: sensor.foxessmodbus_battery_charge
            state_of_charge: sensor.foxessmodbus_battery_soc_1
            name: Batteri
          home:
            entity: sensor.foxessmodbus_load_power
            name: Hus
            subtract_individual: true
          individual:
          - entity: sensor.solar_ai_lader_effekt
            name: Bil
            icon: mdi:car-electric
            display_zero: true
            display_zero_tolerance: 0.01
            color:
            - 84
            - 149
            - 230
        clickable_entities: true
        use_new_flow_rate_model: true
        kw_decimals: 2
        min_flow_rate: 2
        max_flow_rate: 10
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
        - type: conditional
          conditions:
          - condition: numeric_state
            entity: sensor.solar_ai_ev_status
            attribute: cooling_seconds_left
            above: 0
          chip:
            type: template
            entity: sensor.solar_ai_ev_status
            icon: mdi:timer-sand
            icon_color: orange
            content: EV stopper om {{ state_attr('sensor.solar_ai_ev_status','cooling_seconds_left') | int(0) }} s — lav sol
            tap_action:
              action: more-info
        - type: template
          entity: sensor.battery_arbitrage_batteritemperatur_laveste_celle
          icon: mdi:thermometer
          content: Batteritemp {{ states('sensor.battery_arbitrage_batteritemperatur_laveste_celle') }} °C
          icon_color: '{% set t = states(''sensor.battery_arbitrage_batteritemperatur_laveste_celle'') | float(0) %}{% if t < 10 %}blue{% elif t > 40 %}red{% else %}green{% endif %}'
          tap_action:
            action: more-info
      - type: custom:apexcharts-card
        header:
          title: Priser og batteri (24t)
          show: true
        graph_span: 24h
        span:
          start: day
        apex_config:
          chart:
            height: 260
          legend:
            position: bottom
          stroke:
            curve: stepline
        yaxis:
        - id: price
          decimals: 2
          apex_config:
            title:
              text: DKK/kWh
        - id: soc
          opposite: true
          min: 0
          max: 100
          decimals: 0
        series:
        - entity: sensor.solar_ai_24h_priskort
          name: Køb
          yaxis_id: price
          type: line
          color: '#e8453c'
          stroke_width: 2
          data_generator: 'const slots = entity.attributes.slots || [];

            const today = new Date();

            today.setHours(0,0,0,0);

            return slots.map(s => [today.getTime() + s.h*3600*1000 + (s.m||0)*60*1000, s.buy]);'
        - entity: sensor.solar_ai_24h_priskort
          name: Salg
          yaxis_id: price
          type: line
          color: '#3e9c4d'
          stroke_width: 2
          data_generator: 'const slots = entity.attributes.slots || [];

            const today = new Date();

            today.setHours(0,0,0,0);

            return slots.map(s => [today.getTime() + s.h*3600*1000 + (s.m||0)*60*1000, s.sell]);'
        - entity: sensor.foxessmodbus_battery_soc_1
          name: SoC
          yaxis_id: soc
          type: area
          color: '#5995e6'
          stroke_width: 2
          opacity: 0.12
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
        - type: template
          icon: mdi:car-electric
          content: EV
          tap_action:
            action: navigate
            navigation_path: /battery-arbitrage/ev
        - type: template
          icon: mdi:currency-eur
          content: Priser
          tap_action:
            action: navigate
            navigation_path: /battery-arbitrage/priser
        - type: template
          icon: mdi:chart-timeline-variant
          content: Historik
          tap_action:
            action: navigate
            navigation_path: /battery-arbitrage/historik
        - type: template
          icon: mdi:cog
          content: Indstillinger
          tap_action:
            action: navigate
            navigation_path: /battery-arbitrage/indstillinger
        - type: template
          icon: mdi:format-list-bulleted-square
          content: Logs
          tap_action:
            action: navigate
            navigation_path: /battery-arbitrage/logs
      - type: vertical-stack
        cards:
        - type: custom:mushroom-title-card
          title: Solcelleprognose
        - type: markdown
          content: '{% set today = state_attr(''sensor.solar_ai_solcelleprognose_48t_graf'',''today_remaining_kwh'') | float(0) %}{% set today_raw = state_attr(''sensor.solar_ai_solcelleprognose_48t_graf'',''today_remaining_raw_kwh'') | float(0) %}{% set tom = state_attr(''sensor.solar_ai_solcelleprognose_48t_graf'',''tomorrow_kwh'') | float(0) %}{% set tom_raw = state_attr(''sensor.solar_ai_solcelleprognose_48t_graf'',''tomorrow_raw_kwh'') | float(0) %}<!-- 🌞 Solcelleprognose — totals -->

            | | | |

            |---|---:|---:|

            | ☀️ **Rest af i dag** | Adjusted forecast: **{{ ''%.1f'' | format(today) }} kWh** | _Raw forecast: {{ ''%.1f'' | format(today_raw) }} kWh_ |

            | 📅 **I morgen** | Adjusted forecast: **{{ ''%.1f'' | format(tom) }} kWh** | _Raw forecast: {{ ''%.1f'' | format(tom_raw) }} kWh_ |

            '
        - type: custom:mushroom-template-card
          primary: Live solar-korrektion
          secondary: '{% set p = states(''sensor.solar_ai_solcelleprognose_fejl_nu'') | float(0) %}{% set n = state_attr(''sensor.solar_ai_solcelleprognose_fejl_nu'',''samples'') | int(0) %}{% if n == 0 %}Venter på første 15-min slot…{% else %}{{ ''%+.0f'' | format(p) }}%  ·  {{ n }} slot{{ ''s'' if n != 1 else '''' }}  ·  dæmper over 2 t{% endif %}'
          icon: '{% set p = states(''sensor.solar_ai_solcelleprognose_fejl_nu'') | float(0) %}{% set n = state_attr(''sensor.solar_ai_solcelleprognose_fejl_nu'',''samples'') | int(0) %}{% if n == 0 %}mdi:timer-sand{% elif p > 10 %}mdi:weather-sunny{% elif p < -10 %}mdi:weather-cloudy{% else %}mdi:chart-bell-curve{% endif %}'
          icon_color: '{% set p = states(''sensor.solar_ai_solcelleprognose_fejl_nu'') | float(0) %}{% set n = state_attr(''sensor.solar_ai_solcelleprognose_fejl_nu'',''samples'') | int(0) %}{% if n == 0 %}grey{% elif p > 10 %}green{% elif p > -10 %}grey{% elif p > -25 %}amber{% else %}red{% endif %}'
          entity: sensor.solar_ai_solcelleprognose_fejl_nu
          tap_action:
            action: more-info
        - type: custom:apexcharts-card
          header:
            show: true
            title: Solcelleprognose (48 t)
            show_states: false
          graph_span: 48h
          span:
            start: hour
            offset: -0h
          now:
            show: true
            label: Nu
            color: '#9aa0a6'
          yaxis:
          - min: 0
            decimals: 1
            apex_config:
              title:
                text: kW
              forceNiceScale: true
          apex_config:
            chart:
              height: 280
            legend:
              show: true
              position: top
            xaxis:
              labels:
                datetimeUTC: false
                format: ddd HH
            stroke:
              curve: smooth
              width:
              - 0
              - 3
          series:
          - entity: sensor.solar_ai_solcelleprognose_48t_graf
            name: Råt forecast (Solcast)
            type: column
            color: '#b0bec5'
            opacity: 0.55
            show:
              in_header: false
              legend_value: false
            data_generator: return (entity.attributes.slots || []).map(s => [new Date(s.start).getTime(), s.raw_kw]);
          - entity: sensor.solar_ai_solcelleprognose_48t_graf
            name: Justeret (solcelleprognose)
            type: line
            color: '#f9a825'
            stroke_width: 3
            show:
              in_header: false
              legend_value: false
            data_generator: return (entity.attributes.slots || []).map(s => [new Date(s.start).getTime(), s.adj_kw]);
- title: EV / OCPP
  path: ev
  icon: mdi:car-electric
  subview: true
  panel: true
  cards:
  - type: custom:mod-card
    card_mod:
      style: ':host { max-width: 1000px; margin: 0 auto; display: block; }

        '
    card:
      type: vertical-stack
      cards:
      - type: conditional
        conditions:
        - condition: state
          entity: binary_sensor.solar_ai_eksport_stop_aktiv
          state: 'on'
        card:
          type: custom:mushroom-template-card
          primary: 🛑 Eksport-stop aktiv
          secondary: '{% set since = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''since'') %}{% set floor = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''floor'') %}{% set price = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''price_at_start'') | float(0) %}Salgsprisen er under gulvet ({% if floor is not none %}{{ ''%.2f'' | format(floor) }}{% else %}–{% endif %} DKK/kWh). Solcelle-eksport er blokeret.{% if price %} Pris ved start: {{ ''%.3f'' | format(price) }} DKK/kWh.{% endif %}{% if since %} Aktiv siden {{ since[11:16] }}.{% endif %}'
          icon: mdi:transmission-tower-off
          icon_color: red
          fill_container: true
          multiline_secondary: true
          entity: binary_sensor.solar_ai_eksport_stop_aktiv
          tap_action:
            action: more-info
      - type: vertical-stack
        cards:
        - type: vertical-stack
          cards:
          - type: custom:mushroom-title-card
            title: EV-opladningstilstand
          - type: horizontal-stack
            cards:
            - type: custom:mushroom-template-card
              primary: Fra
              icon: mdi:lock
              icon_color: '{% if states(''select.solar_ai_ev_opladningstilstand'') == ''locked'' %}blue{% else %}grey{% endif %}'
              fill_container: true
              layout: vertical
              tap_action:
                action: call-service
                service: select.select_option
                service_data:
                  option: locked
                target:
                  entity_id: select.solar_ai_ev_opladningstilstand
              hold_action:
                action: none
            - type: custom:mushroom-template-card
              primary: Sol
              icon: mdi:weather-sunny
              icon_color: '{% if states(''select.solar_ai_ev_opladningstilstand'') == ''pv'' %}blue{% else %}grey{% endif %}'
              fill_container: true
              layout: vertical
              tap_action:
                action: call-service
                service: select.select_option
                service_data:
                  option: pv
                target:
                  entity_id: select.solar_ai_ev_opladningstilstand
              hold_action:
                action: none
            - type: custom:mushroom-template-card
              primary: Sol+Bat
              icon: mdi:weather-sunny-alert
              icon_color: '{% if states(''select.solar_ai_ev_opladningstilstand'') == ''pv_battery'' %}blue{% else %}grey{% endif %}'
              fill_container: true
              layout: vertical
              tap_action:
                action: call-service
                service: select.select_option
                service_data:
                  option: pv_battery
                target:
                  entity_id: select.solar_ai_ev_opladningstilstand
              hold_action:
                action: none
            - type: custom:mushroom-template-card
              primary: Hurtig
              icon: mdi:rocket-launch
              icon_color: '{% if states(''select.solar_ai_ev_opladningstilstand'') == ''full'' %}blue{% else %}grey{% endif %}'
              fill_container: true
              layout: vertical
              tap_action:
                action: call-service
                service: select.select_option
                service_data:
                  option: full
                target:
                  entity_id: select.solar_ai_ev_opladningstilstand
              hold_action:
                action: none
            - type: custom:mushroom-template-card
              primary: Planlagt
              icon: mdi:calendar-clock
              icon_color: '{% if states(''select.solar_ai_ev_opladningstilstand'') == ''scheduled'' %}blue{% else %}grey{% endif %}'
              fill_container: true
              layout: vertical
              tap_action:
                action: call-service
                service: select.select_option
                service_data:
                  option: scheduled
                target:
                  entity_id: select.solar_ai_ev_opladningstilstand
              hold_action:
                action: none
        - type: horizontal-stack
          cards:
          - type: custom:mushroom-template-card
            primary: Bil tilsluttet
            secondary: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% if s in [''Charging''] %}🔋 Oplader nu — {{ states(''sensor.solar_ai_lader_effekt'') }} kW{% elif s in [''Preparing'', ''SuspendedEV'', ''SuspendedEVSE'', ''Finishing''] %}🔌 Bil tilsluttet ({{ s }}){% elif s == ''Available'' %}⚪ Ingen bil tilsluttet{% elif s in [''Disconnected'', ''Unavailable'', ''Unknown'', ''unavailable'', ''unknown''] %}❌ Lader ikke forbundet{% else %}{{ s }}{% endif %}'
            icon: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% if s == ''Charging'' %}mdi:battery-charging{% elif s in [''Preparing'',''SuspendedEV'',''SuspendedEVSE'',''Finishing''] %}mdi:ev-plug-type2{% elif s == ''Available'' %}mdi:car-electric-outline{% else %}mdi:lan-disconnect{% endif %}'
            icon_color: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% if s == ''Charging'' %}green{% elif s in [''Preparing'',''SuspendedEV'',''SuspendedEVSE'',''Finishing''] %}blue{% elif s == ''Available'' %}grey{% else %}red{% endif %}'
            entity: sensor.solar_ai_lader_status
            tap_action:
              action: more-info
            fill_container: true
          - type: custom:mushroom-template-card
            primary: EV-charger
            secondary: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% set seen = state_attr(''sensor.solar_ai_lader_status'', ''seconds_since_seen'') %}{% if s in [''Disconnected'', ''Unavailable''] %}❌ Afbrudt{% elif s in [''Unknown'', ''unknown'', ''unavailable''] %}⏳ Venter på status{% else %}✅ {{ s }}{% if seen %} · {{ seen | int }}s siden{% endif %}{% endif %}'
            icon: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% if s == ''Charging'' %}mdi:battery-charging-high{% elif s in [''Preparing'', ''SuspendedEV'', ''SuspendedEVSE''] %}mdi:ev-plug-type2{% elif s == ''Finishing'' %}mdi:battery-charging-50{% elif s == ''Available'' %}mdi:ev-station{% elif s == ''Reserved'' %}mdi:calendar-clock{% elif s == ''Faulted'' %}mdi:alert-circle{% elif s in [''Disconnected'', ''Unavailable''] %}mdi:lan-disconnect{% else %}mdi:ev-station{% endif %}'
            icon_color: '{% set s = states(''sensor.solar_ai_lader_status'') %}{% if s == ''Charging'' %}green{% elif s in [''Preparing'', ''SuspendedEV'', ''SuspendedEVSE''] %}amber{% elif s == ''Finishing'' %}cyan{% elif s == ''Available'' %}blue{% elif s == ''Reserved'' %}purple{% elif s == ''Faulted'' %}red{% elif s in [''Disconnected'', ''Unavailable''] %}grey{% else %}grey{% endif %}'
            fill_container: true
        - type: horizontal-stack
          cards:
          - type: custom:mushroom-template-card
            primary: '{{ states(''sensor.solar_ai_lader_effekt'') }} kW'
            secondary: EFFEKT
            icon: mdi:flash
            icon_color: '{% set p = states(''sensor.solar_ai_lader_effekt'') | float(0) %}{% if p > 0.1 %}green{% else %}grey{% endif %}'
            fill_container: true
          - type: custom:mushroom-template-card
            primary: '{% set surp = state_attr(''sensor.solar_ai_ev_status'', ''surplus_kw'') | float(0) %}{{ ''%.2f'' | format(surp) }} kW'
            secondary: OVERSKUD TIL EV
            icon: mdi:solar-power-variant
            icon_color: '{% set surp = state_attr(''sensor.solar_ai_ev_status'', ''surplus_kw'') | float(0) %}{% if surp > 0.1 %}amber{% else %}grey{% endif %}'
            fill_container: true
        - type: markdown
          content: '{% set st = states(''sensor.solar_ai_ev_status'') %}{% set en = state_attr(''sensor.solar_ai_ev_status'', ''enabled'') %}{% set reason = state_attr(''sensor.solar_ai_ev_status'', ''reason'') %}{% set arm_iso = state_attr(''sensor.solar_ai_ev_status'',''arming_until'') %}{% set arm_raw = ((as_timestamp(arm_iso) - as_timestamp(now())) | int(0)) if arm_iso else 0 %}{% set arm = [arm_raw, 0] | max %}{% set cool_iso = state_attr(''sensor.solar_ai_ev_status'',''cooling_until'') %}{% set cool_raw = ((as_timestamp(cool_iso) - as_timestamp(now())) | int(0)) if cool_iso else 0 %}{% set cool = [cool_raw, 0] | max %}{% set kw = state_attr(''sensor.solar_ai_ev_status'',''target_kw'') | float(0) %}{% set amps = state_attr(''sensor.solar_ai_ev_status'',''target_amps'') | int(0) %}{% set bat_locked = state_attr(''sensor.solar_ai_ev_status'',''battery_locked'') %}{% if not en %}🔒 **EV-controller slået fra.**{% elif st == ''CHARGING'' %}🔋 **Oplader: {{ ''%.1f'' | format(kw) }} kW · {{ amps }} A**{% if bat_locked %}  ·  🔒 Husbatteri låst{% endif %}{% elif st == ''ARMING'' %}⏳ **Starter om {{ arm }} sek**{% elif st == ''COOLING'' %}⏳ **Stopper om {{ cool }} sek**{% else %}💤 **Inaktiv**{% if reason %}


            _{{ reason }}_{% endif %}{% endif %}'
      - type: markdown
