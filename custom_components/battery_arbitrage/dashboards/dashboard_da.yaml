- title: Priser & Plan
  path: priser
  icon: mdi:currency-eur
  subview: true
  panel: true
  cards:
  - type: custom:mod-card
    card_mod:
      style: ':host { max-width: 1000px; margin: 0 auto; display: block; }

        '
    card:
      type: vertical-stack
      cards:
      - type: markdown
        title: Prissammensætning
        content: '{% set spot_markup = states(''number.solar_ai_spotpris_tillaeg_elhandlertillaeg'') | float(0) %}

          {% set export_fee = states(''number.solar_ai_salgsgebyr_pr_kwh'') | float(0) %}

          {% set feed_in = states(''sensor.solar_ai_indfodningstarif_dso_energinet'') | float(0) %}

          {% set export_price = states(''sensor.battery_arbitrage_eksportpris'') | float(0) %}

          {% set spot_ex_vat = export_price + export_fee + feed_in %}

          {% set tariff_total = states(''sensor.solar_ai_nettarif_denne_time'') | float(0) %}

          {% set elafgift = states(''number.solar_ai_elafgift_dkk_kwh'') | float(0) %}

          {% set network_tariff = tariff_total - elafgift %}

          {% set vat_pct = states(''number.solar_ai_moms_pa_kob'') | float(25) %}

          {% set vat_factor = 1 + vat_pct / 100 %}

          {% set pretax_buy = spot_ex_vat + spot_markup + tariff_total %}

          {% set total_buy = pretax_buy * vat_factor %}

          {% set spread = states(''sensor.battery_arbitrage_net_arbitrage_spread'') | float(0) %}

          {% set min_spread = states(''number.solar_ai_minimum_arbitrage_spread'') | float(0.30) %}

          {% set min_export = states(''sensor.solar_ai_minimum_eksportpris'') | float(0) %}


          #### 📈 Salgspris (eksport)

          | | DKK/kWh |

          |:---|---:|

          | Spotpris (ekskl. moms) | {{ ''%.3f'' | format(spot_ex_vat) }} |

          | − Salgsgebyr | {{ ''%.3f'' | format(export_fee) }} |

          | − Indfødningstarif | {{ ''%.3f'' | format(feed_in) }} |

          | **Netto eksportpris** | **{{ ''%.3f'' | format(export_price) }}** |


          #### 🔌 Købspris (denne time)

          | | DKK/kWh |

          |:---|---:|

          | Spotpris (ekskl. moms) | {{ ''%.3f'' | format(spot_ex_vat) }} |

          | + Spotpris-tillæg | {{ ''%.3f'' | format(spot_markup) }} |

          | + Nettarif | {{ ''%.3f'' | format(network_tariff) }} |

          | + Elafgift | {{ ''%.3f'' | format(elafgift) }} |

          | + Moms ({{ vat_pct | int }} %) | {{ ''%.3f'' | format(pretax_buy * vat_pct / 100) }} |

          | **Samlet købspris** | **{{ ''%.3f'' | format(total_buy) }}** |


          #### ⚖️ Arbitrage-spread

          **{{ ''%.3f'' | format(spread) }} DKK/kWh** {% if spread >= min_spread %}✅ over grænse ({{ ''%.2f'' | format(min_spread) }}){% else %}⛔ under grænse ({{ ''%.2f'' | format(min_spread) }}){% endif %}'
      - type: custom:apexcharts-card
        header:
          title: 24h priskort
          show: true
        graph_span: 24h
        span:
          start: day
        apex_config:
          chart:
            height: 380
            type: bar
          plotOptions:
            bar:
              borderRadius: 3
              columnWidth: 80%
          legend:
            position: bottom
          dataLabels:
            enabled: false
          stroke:
            width: 0
          xaxis:
            type: datetime
            labels:
              datetimeFormatter:
                hour: HH:mm
          tooltip:
            x:
              format: HH:mm
            y:
              formatter: EVAL:function(value) { if (value == null || isNaN(value)) return ''; return value.toFixed(2).replace('.', ',') + ' DKK/kWh'; }
        yaxis:
        - id: price
          decimals: 2
          apex_config:
            title:
              text: DKK/kWh
            labels:
              formatter: EVAL:function(value) { if (value == null || isNaN(value)) return ''; return value.toFixed(2).replace('.', ','); }
        series:
        - entity: sensor.solar_ai_24h_priskort
          name: Køb (inkl. moms + tarif)
          type: column
          color: '#e8453c'
          data_generator: "const slots = entity.attributes.slots || [];\nconst today = new Date();\ntoday.setHours(0, 0, 0, 0);\nreturn slots.map(s => [\n  today.getTime() + s.h * 3600 * 1000 + (s.m || 0) * 60 * 1000,\n  s.buy\n]);"
        - entity: sensor.solar_ai_24h_priskort
          name: Salg (eksport)
          type: column
          color: '#3e9c4d'
          data_generator: "const slots = entity.attributes.slots || [];\nconst today = new Date();\ntoday.setHours(0, 0, 0, 0);\nreturn slots.map(s => [\n  today.getTime() + s.h * 3600 * 1000 + (s.m || 0) * 60 * 1000,\n  s.sell\n]);"
      - type: markdown
        content: '## Købspris-matrix (DKK/kWh)

          {% set slots = state_attr(''sensor.solar_ai_kobspris_prognose'',''slots'') or [] %}{% set today = now().date() %}{% set tom = today + timedelta(days=1) %}{% macro cell(v) %}{% if v is none %}·{% elif v<1.0 %}🟢{{''%.1f''|format(v)}}{% elif v<1.5 %}🟡{{''%.1f''|format(v)}}{% elif v<2.0 %}🟠{{''%.1f''|format(v)}}{% else %}🔴{{''%.1f''|format(v)}}{% endif %}{% endmacro %}

          | | {% for h in range(24) %}{{''%02d''|format(h)}} | {% endfor %}

          |--|{% for h in range(24) %}:--:|{% endfor %}

          | **I dag** | {% for h in range(24) %}{% set v=namespace(b=none) %}{% for s in slots %}{% set d=s.iso|as_datetime|as_local %}{% if d.hour==h and d.date()==today %}{% set v.b=s.buy %}{% endif %}{% endfor %}{{ cell(v.b) }} | {% endfor %}

          | **I morgen** | {% for h in range(24) %}{% set v=namespace(b=none) %}{% for s in slots %}{% set d=s.iso|as_datetime|as_local %}{% if d.hour==h and d.date()==tom %}{% set v.b=s.buy %}{% endif %}{% endfor %}{{ cell(v.b) }} | {% endfor %}'
        card_mod:
          style:
            .: 'ha-card { overflow-x: auto; }'
            ha-markdown $: 'table { font-size: 13px; white-space: nowrap; border-collapse: collapse; min-width: max-content; }

              th, td { padding: 4px 8px; text-align: center; }

              td:first-child, th:first-child { position: sticky; left: 0; background: var(--ha-card-background, var(--card-background-color, white)); font-weight: 600; }'
      - type: markdown
        content: '## Salgspris-matrix (DKK/kWh)

          {% set slots = state_attr(''sensor.solar_ai_kobspris_prognose'',''slots'') or [] %}{% set today = now().date() %}{% set tom = today + timedelta(days=1) %}{% macro cell(v) %}{% if v is none %}·{% elif v>=1.0 %}🟢{{''%.1f''|format(v)}}{% elif v>=0.7 %}🟡{{''%.1f''|format(v)}}{% elif v>=0.4 %}🟠{{''%.1f''|format(v)}}{% else %}🔴{{''%.1f''|format(v)}}{% endif %}{% endmacro %}

          | | {% for h in range(24) %}{{''%02d''|format(h)}} | {% endfor %}

          |--|{% for h in range(24) %}:--:|{% endfor %}

          | **I dag** | {% for h in range(24) %}{% set v=namespace(b=none) %}{% for s in slots %}{% set d=s.iso|as_datetime|as_local %}{% if d.hour==h and d.date()==today %}{% set v.b=s.sell %}{% endif %}{% endfor %}{{ cell(v.b) }} | {% endfor %}

          | **I morgen** | {% for h in range(24) %}{% set v=namespace(b=none) %}{% for s in slots %}{% set d=s.iso|as_datetime|as_local %}{% if d.hour==h and d.date()==tom %}{% set v.b=s.sell %}{% endif %}{% endfor %}{{ cell(v.b) }} | {% endfor %}'
        card_mod:
          style:
            .: 'ha-card { overflow-x: auto; }'
            ha-markdown $: 'table { font-size: 13px; white-space: nowrap; border-collapse: collapse; min-width: max-content; }

              th, td { padding: 4px 8px; text-align: center; }

              td:first-child, th:first-child { position: sticky; left: 0; background: var(--ha-card-background, var(--card-background-color, white)); font-weight: 600; }'
      - type: entities
        title: 24h prisstatistik
        icon: mdi:chart-bar
        show_header_toggle: false
        entities:
        - entity: sensor.battery_arbitrage_24h_prisminimum
          name: Minimum
        - entity: sensor.battery_arbitrage_24h_prismaksimum
          name: Maksimum
        - entity: sensor.battery_arbitrage_24h_prisgennemsnit
          name: Gennemsnit
