- title: Indstillinger
  path: indstillinger
  icon: mdi:cog
  subview: true
  panel: true
  cards:
  - type: custom:solar-ai-view-card
    cards:
    - type: custom:solar-ai-entities-card
      title: Hovedkontakter
      icon_color: blue-grey
      icon: mdi:toggle-switch
      show_header_toggle: false
      entities:
      - entity: switch.battery_arbitrage_arbitrage_aktiv
        name: Solar AI til/fra
        help: Slukker for al automatisk styring. Batteriet og opladeren fortsætter med den tilstand, de sidst var i — de bliver ikke nulstillet.
      - entity: switch.solar_ai_notifikationer_ved_tilstandsskift
        name: Notifikationer ved tilstandsskift
        help: Send en notifikation, hver gang Solar AI skifter mellem eksport, netopladning og selvforbrug.
      - entity: switch.solar_ai_15_minutters_prisoplosning
        name: 15-min prisopløsning
        help: Brug 15-minutters elpriser i stedet for timepriser, hvis din elleverandør leverer dem. Giver mere præcis planlægning omkring pris-spring.
      - entity: switch.solar_ai_auto_fuld_ved_negativ_pris
        name: 'EV: Auto-Fuld ved negativ pris'
        help: Skifter automatisk EV til Fuld-tilstand, når spotprisen bliver negativ, og skifter tilbage til den forrige tilstand, når prisen igen er positiv.
    - type: custom:solar-ai-entities-card
      title: Batteri-grænser
      icon_color: blue
      icon: mdi:battery-charging-50
      show_header_toggle: false
      entities:
      - entity: number.solar_ai_batterikapacitet_kwh
        name: Batterikapacitet (kWh)
        help: Batteriets nominelle kapacitet. Bruges til at omregne SoC-procent til kWh i alle beregninger — en forkert værdi giver en forkert reserve og forkert planlægning.
      - entity: number.solar_ai_minimum_soc_eksport
        name: Minimum SoC (eksport)
        help: Batteriet sælges ikke ned under dette niveau. Det faktiske gulv kan ligge højere om natten — se "Effektivt gulv (aktivt)" — men aldrig lavere end dette.
      - entity: number.solar_ai_maksimum_soc_netopladning
        name: Maksimum SoC (netopladning)
        help: Loft for hvor højt batteriet må lades fra nettet under en arbitrage-opladning.
      - entity: number.solar_ai_eksporteffekt_graense_0_ingen
        name: Eksporteffekt-grænse (kW)
        help: Loft for hvor meget effekt der eksporteres til nettet ad gangen. 0 = ingen grænse.
      - entity: number.solar_ai_net_importgraense
        name: Net-importgrænse (kW)
        help: Din sikringers/hovedafbryders grænse. Solar AI holder EV + batteriopladning + husforbrug under denne værdi for at undgå at springe sikringen.
      - entity: switch.solar_ai_dynamisk_afladningsgulv_selvlaerende
        name: Dynamisk afladningsgulv (auto)
        help: Når slået til, beregnes nattens reserve dynamisk ud fra forventet husforbrug og sol frem til i morgen, i stedet for et fast minimumsniveau. Anbefales slået til.
      - entity: sensor.solar_ai_effektivt_afladningsgulv
        name: Effektivt gulv (aktivt)
        help: Den faktiske SoC-grænse lige nu — Minimum SoC plus den dynamiske nat-reserve, hvis den er aktiveret. Dette er den reelle grænse, batteriet styres efter i øjeblikket.
      - entity: number.solar_ai_reserve_sikkerhedsfaktor
        name: Reserve-sikkerhedsfaktor
        help: Sikkerhedsmargin oven på den beregnede nat-reserve, f.eks. 1.3 = 30% ekstra. Bruges indtil systemet har lært husets faktiske forbrugsmønster (7 rene nætter), hvorefter den selvlærende værdi (Reserve-percentil) overtager.
      - entity: number.solar_ai_reserve_percentil_prognosefejl_daekning_nar_nataflaeringen_er_varm_80_tidligere_fast_adfaerd
        name: Reserve-percentil (%)
        help: Når systemet er "varmet op" (7 rene nætter), styres reserven af denne percentil af den observerede prognosefejl i stedet for den faste faktor ovenfor. Lavere værdi = mindre reserve, mere til salg — men lidt større risiko for en stram nat. 80 er standard og svarer til den hidtidige faste opførsel.
      - entity: binary_sensor.solar_ai_modelhelbred
        name: Modelhelbred
        help: 'Fra = ingen problemer (normal tilstand). Til = et problem er fundet. Overvåger de selvlærende modeller (reserve, batterikapacitet, effektivitet, opladningshastigheder) for drift eller vedvarende forkerte forudsigelser. Slår kun alarm — retter aldrig noget automatisk.'
    - type: custom:solar-ai-entities-card
      title: Prisparametre
      icon_color: amber
      icon: mdi:currency-eur
      show_header_toggle: false
      entities:
      - entity: number.solar_ai_moms_pa_kob
        name: Moms (%)
        help: 'Momssats på køb af strøm. Bruges kun i manuel prismodel, og i Strømligning-tilstand hvis "manuelle moms-/tillæg-/elafgift-overrides" er slået til under opsætning. Ved ren Octopus- eller Strømligning-prisning er moms allerede indregnet i den pris, der hentes direkte fra leverandøren, og denne indstilling bruges ikke.'
      - entity: number.solar_ai_elafgift_dkk_kwh
        name: Elafgift
        help: 'Den danske elafgift pr. kWh, lagt oven på købsprisen i manuel prismodel og i Strømligning med manuelle overrides. Ved ren Octopus- eller Strømligning-prisning er elafgiften allerede indregnet i leverandørens pris, og denne indstilling bruges ikke.'
      - entity: number.solar_ai_spotpris_tillaeg_elhandlertillaeg
        name: Spotpris-tillæg
        help: 'Din elhandlers faste tillæg pr. kWh oven på spotprisen (f.eks. abonnement omregnet til øre/kWh, eller et fast markup). Bruges i manuel prismodel og i Strømligning med manuelle overrides. Ved ren Octopus- eller Strømligning-prisning er leverandørens eget tillæg allerede indregnet i deres pris, og denne indstilling bruges ikke.'
      - entity: number.solar_ai_salgsgebyr_pr_kwh
        name: Salgsgebyr (eksport)
        help: 'Gebyr din elhandler/netselskab trækker pr. kWh du sælger til nettet. Trækkes fra salgsprisen — men hvis du under opsætning har valgt et navngivet salgsselskab med et kendt gebyr, bruges det gebyr i stedet for denne værdi.'
      - entity: number.solar_ai_minimum_eksportpris_0_tillad_negativ
        name: Minimum eksportpris
        help: Salg blokeres, når prisen falder til eller under denne værdi. 0 = tillad salg helt ned til negative priser.
    - type: custom:solar-ai-entities-card
      title: Optimizer
      icon_color: purple
      icon: mdi:chart-line
      show_header_toggle: false
      entities:
      - entity: number.solar_ai_minimum_arbitrage_spread
        name: Minimum gevinst pr. kWh
        help: Hvor stor forskellen mellem købs- og salgspris mindst skal være, før systemet oplader batteriet fra nettet for at sælge det igen senere. Højere værdi = færre, men mere sikre handler.
      - entity: number.solar_ai_batteri_slidomkostning_dkk_kwh_cyklet
        name: Batteri-slidomkostning
        help: Anslået slid på batteriet pr. kWh der lades/aflades, indregnet som en omkostning i alle arbitrage-beregninger. Trækkes fra på både opladnings- og salgssiden af en cyklus, så den reelle tærskel for en handel er højere end "Minimum gevinst" alene antyder.
    - type: custom:solar-ai-entities-card
      title: System
      icon_color: grey
      icon: mdi:harddisk
      show_header_toggle: false
      entities:
      - entity: sensor.solar_ai_ledig_diskplads
