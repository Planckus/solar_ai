- title: Advanced setup
  path: advanced
  icon: mdi:tune-variant
  subview: true
  panel: true
  cards:
  - type: custom:mod-card
    card_mod:
      style: |
        :host { max-width: 1000px; margin: 0 auto; display: block; }
    card:
      type: vertical-stack
      cards:
      - type: custom:mushroom-title-card
        title: Advanced setup
        subtitle: Structural configuration — data sources, price model and price area
      - type: custom:mushroom-template-card
        primary: Open integration setup (Configure)
        secondary: FoxESS sensors, sources & OCPP — fields that can't be dashboard controls
        icon: mdi:cog-outline
        icon_color: blue
        tap_action:
          action: navigate
          navigation_path: /config/integrations/integration/battery_arbitrage
      - type: entities
        title: Data sources & price model
        icon: mdi:database-cog
        show_header_toggle: false
        entities:
        - entity: select.solar_ai_live_data_source
          name: Live data source
        - entity: select.solar_ai_solar_forecast_source
          name: Solar forecast source
        - entity: select.solar_ai_buy_price_mode
          name: Buy-price mode
        - entity: switch.solar_ai_kryds_kilde_prisfallback_stromligning_eds
          name: Cross-source price fallback
        - entity: select.solar_ai_electricity_product_provider
          name: Electricity product (provider)
        - entity: select.solar_ai_price_area
          name: Price area
      - type: entities
        title: EV charger
        icon: mdi:ev-station
        show_header_toggle: false
        entities:
        - entity: select.solar_ai_ev_charger_backend
          name: Charger backend
        - entity: text.solar_ai_foxess_charger_host_ip
          name: FoxESS charger IP (Modbus only)
        - entity: switch.solar_ai_embedded_ocpp_server
          name: Embedded OCPP server (other brands)
        - entity: number.solar_ai_ev_control_interval
          name: Control interval (sec)
      - type: entities
        title: Diagnostics & learned models
        icon: mdi:chart-bell-curve
        show_header_toggle: false
        entities:
        - entity: sensor.solar_ai_laert_batterikapacitet
          name: Learned battery capacity
        - entity: sensor.solar_ai_auto_detekteret_effektivitet
          name: Auto-detected efficiency
        - entity: sensor.battery_arbitrage_laert_opladningshastighed_aktuel_temp
          name: Learned charge rate (now)
        - entity: sensor.battery_arbitrage_solcelle_prognose_nojagtighed
          name: Solar forecast accuracy
        - entity: sensor.solar_ai_effektivt_afladningsgulv
          name: Effective discharge floor
- title: Logs
  path: logs
  icon: mdi:format-list-bulleted-square
  subview: true
  panel: true
  cards:
  - type: custom:mod-card
    card_mod:
      style: ':host { max-width: 1000px; margin: 0 auto; display: block; }

        '
    card:
      type: vertical-stack
      cards:
      - type: vertical-stack
        cards:
        - type: markdown
          content: '<!-- 🚗 Charger session history -->

            ## 🚗 Charger session history


            {% set sessions = state_attr(''sensor.solar_ai_lader_sessions_log'', ''sessions'') or [] %}{% if sessions | length == 0 %}_No completed sessions yet. When a car is plugged in and charging,

            start/end times and the energy-source split are shown here._

            {% else %}| Start | Duration | Total | ☀️ Solar | ⚡ Net |

            |---|---:|---:|---:|---:|

            {% for s in sessions %}| {{ as_datetime(s.start_ts).astimezone() | as_timestamp | timestamp_custom(''%a %d/%m %H:%M'', true) }} | {{ ''%.0f'' | format(s.duration_min) }} min | **{{ ''%.2f'' | format(s.energy_kwh) }} kWh** | {{ ''%.2f'' | format(s.energy_kwh_solar | default(0)) }} | {{ ''%.2f'' | format(s.energy_kwh_grid | default(0)) }} |

            {% endfor %}

            _Times are local. The solar/grid split is integrated per tick from live PV surplus and can differ a few percent from the charger total meter value._{% endif %}'
        - type: markdown
          content: '## 📋 Logs


            Complete history of everything Solar AI has recorded. Each log keeps up to 500 entries; the latest 50 are shown here.

            '
      - type: markdown
        title: 🔋 Session log (export + grid charging)
        content: '{% set sessions = state_attr(''sensor.solar_ai_sessionslog'', ''sessions'') | default([]) %}

          {% if sessions %}

          **{{ sessions | length }} af {{ states(''sensor.solar_ai_sessionslog'') }} sessions** (newest first)


          | Start | End | Type | SoC | Duration | kWh | DKK |

          |:------|:-----|:-----|:----|:---------|:----|:----|

          {% for s in sessions[:50] %}{% set icon = ''💰'' if s.type == ''export'' else ''⚡'' %}{% set label = ''Export'' if s.type == ''export'' else ''Charge'' %}

          | {{ s.start_ts[11:16] }} | {{ s.end_ts[11:16] }} | {{ icon }} {{ label }} | {{ s.soc_start | round(0) | int }}→{{ s.soc_end | round(0) | int }}% | {{ s.duration_min }} min | {{ s.kwh }} | {{ s.dkk }} |{% endfor %}

          {% else %}

          *No sessions recorded yet.*


          Sessions are recorded when Solar AI actively switches the inverter to **Feed-in First** (export) or **Force Charge** (grid charging). With the main switch off, no sessions are recorded.

          {% endif %}'
      - type: markdown
        title: ☀️ Price-floor blocks (low prices)
        content: '{% set events = state_attr(''sensor.solar_ai_solgulv_log_blokering'', ''events'') | default([]) %}

          {% if events %}

          **{{ events | length }} af {{ states(''sensor.solar_ai_solgulv_log_blokering'') }} blocks** (newest first)


          | Start | End | Duration | Price start | Price end | Floor |

          |:------|:-----|:---------|:-----------|:----------|:-----|

          {% for e in events[:50] %}

          | {{ e.start_ts[11:16] }} | {{ e.end_ts[11:16] }} | {{ e.duration_min }} min | {{ ''%.3f'' | format(e.price_at_start) }} | {{ ''%.3f'' | format(e.price_at_end) }} | {{ ''%.2f'' | format(e.floor) }} |{% endfor %}

          {% else %}

          *No price-floor blocks recorded yet.*


          A block is recorded when the sell price falls below the configured minimum (`Minimum export price` in Settings), and ends when the price rises again.

          {% endif %}'
      - type: entities
        title: 💰 Savings
        icon: mdi:cash
        show_header_toggle: false
        entities:
        - entity: sensor.solar_ai_faktisk_besparelse_i_dag
          name: Today — actual
        - entity: sensor.solar_ai_forpasset_besparelse_i_dag
          name: Today — missed
        - type: divider
        - entity: sensor.solar_ai_faktisk_besparelse_7_dage
          name: 7 days — actual
        - entity: sensor.solar_ai_forpasset_besparelse_7_dage
          name: 7 days — missed
        - type: divider
        - entity: sensor.solar_ai_faktisk_besparelse_30_dage
          name: 30 days — actual
        - entity: sensor.solar_ai_forpasset_besparelse_30_dage
          name: 30 days — missed
