          |--|{% for h in range(24) %}:--:|{% endfor %}

          | **Today** | {% for h in range(24) %}{% set v=namespace(b=none) %}{% for s in slots %}{% set d=s.iso|as_datetime|as_local %}{% if d.hour==h and d.date()==today %}{% set v.b=s.sell %}{% endif %}{% endfor %}{{ cell(v.b) }} | {% endfor %}

          | **Tomorrow** | {% for h in range(24) %}{% set v=namespace(b=none) %}{% for s in slots %}{% set d=s.iso|as_datetime|as_local %}{% if d.hour==h and d.date()==tom %}{% set v.b=s.sell %}{% endif %}{% endfor %}{{ cell(v.b) }} | {% endfor %}'
