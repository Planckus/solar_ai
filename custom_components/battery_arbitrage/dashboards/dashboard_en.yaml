title: Solar AI
views:
- title: Solar AI
  path: hjem
  icon: mdi:home
  panel: true
  cards:
  - type: custom:solar-ai-view-card
    cards:
    - type: custom:solar-ai-status-card
      mode_entity: sensor.battery_arbitrage_driftstilstand
      mode_reason_entity: sensor.battery_arbitrage_begrundelse_for_tilstand
      enabled_entity: switch.battery_arbitrage_arbitrage_aktiv
      house_load_entity: sensor.foxessmodbus_load_power
      solar_entity: sensor.pv_power_foxessmodbus
      battery_charge_entity: sensor.foxessmodbus_battery_charge
      battery_discharge_entity: sensor.foxessmodbus_battery_discharge
      battery_soc_entity: sensor.foxessmodbus_battery_soc_1
      battery_floor_entity: sensor.solar_ai_effektivt_afladningsgulv
      grid_import_entity: sensor.foxessmodbus_grid_consumption
      grid_export_entity: sensor.foxessmodbus_feed_in
      ev_power_entity: sensor.solar_ai_lader_effekt
      ev_status_entity: sensor.solar_ai_ev_status
      buy_price_entity: sensor.solar_ai_indkobspris_opdeling
      sell_price_entity: sensor.battery_arbitrage_eksportpris
      savings_today_entity: sensor.solar_ai_samlet_besparelse_i_dag
      solar_forecast_entity: sensor.solar_ai_solcelleprognose_48t_graf
      solar_actual_today_entity: sensor.foxessmodbus_solar_energy_today
      prices_navigate_path: /battery-arbitrage/priser
    - type: custom:solar-ai-mode-picker-card
      title: Charge mode
      entity: select.solar_ai_ev_opladningstilstand
    - type: custom:solar-ai-entities-card
      title: Solar forecast accuracy
      icon_color: amber
      show_header_toggle: false
      entities:
      - entity: sensor.solar_ai_solcelleprognose_fejl_nu
        name: Live solar correction
    - type: custom:solar-ai-chart-card
      title: Prices (24h)
      icon: mdi:currency-eur
      icon_color: amber
      height: 180
      x_type: hour_offset
      unit: kr
      series:
      - entity: sensor.solar_ai_24h_priskort
        path: slots
        x: h
        y: buy
        type: line
        curve: step
        color: var(--error-color)
        name: Buy
      - entity: sensor.solar_ai_24h_priskort
        path: slots
        x: h
        y: sell
        type: line
        curve: step
        color: var(--success-color)
        name: Sell
    - type: custom:solar-ai-chart-card
      title: Solar forecast (48h)
      icon: mdi:weather-partly-cloudy
      icon_color: amber
      height: 220
      x_type: timestamp
      unit: kW
      now_marker: true
      series:
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: raw_kw
        type: bar
        color: '#b0bec580'
        name: Raw (Solcast)
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: adj_kw
        type: line
        curve: smooth
        color: var(--warning-color)
        name: Adjusted
    - type: custom:solar-ai-nav-card
      items:
      - icon: mdi:car-electric
        icon_color: blue
        label: EV
        path: /battery-arbitrage/ev
      - icon: mdi:currency-eur
        icon_color: amber
        label: Prices
        path: /battery-arbitrage/priser
      - icon: mdi:chart-timeline-variant
        icon_color: purple
        label: History
        path: /battery-arbitrage/historik
      - icon: mdi:cog
        icon_color: cyan
        label: Settings
        path: /battery-arbitrage/indstillinger
      - icon: mdi:format-list-bulleted-square
        icon_color: green
        label: Logs
        path: /battery-arbitrage/logs
      - icon: mdi:tune-variant
        icon_color: blue-grey
        label: Advanced
        path: /battery-arbitrage/advanced
- title: EV
  path: ev
  icon: mdi:car-electric
  subview: true
  panel: true
  cards:
  - type: custom:solar-ai-view-card
    cards:
    - type: conditional
      conditions:
      - condition: state
        entity: binary_sensor.solar_ai_eksport_stop_aktiv
        state: 'on'
      card:
        type: markdown
        content: '## 🛑 Export-stop active

          {% set since = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''since'') %}{% set floor = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''floor'') %}{% set price = state_attr(''binary_sensor.solar_ai_eksport_stop_aktiv'', ''price_at_start'') | float(0) %}The sell price is below the floor ({% if floor is not none %}{{ ''%.2f'' | format(floor) }}{% else %}–{% endif %} DKK/kWh). Solar export is blocked.{% if price %} Price at start: {{ ''%.3f'' | format(price) }} DKK/kWh.{% endif %}{% if since %} Active since {{ since[11:16] }}.{% endif %}'
    - type: custom:solar-ai-mode-picker-card
      title: EV charge mode
      entity: select.solar_ai_ev_opladningstilstand
    - type: custom:solar-ai-status-card
      mode_entity: sensor.battery_arbitrage_driftstilstand
      mode_reason_entity: sensor.battery_arbitrage_begrundelse_for_tilstand
      enabled_entity: switch.battery_arbitrage_arbitrage_aktiv
      house_load_entity: sensor.foxessmodbus_load_power
      solar_entity: sensor.pv_power_foxessmodbus
      battery_charge_entity: sensor.foxessmodbus_battery_charge
      battery_discharge_entity: sensor.foxessmodbus_battery_discharge
      battery_soc_entity: sensor.foxessmodbus_battery_soc_1
      battery_floor_entity: sensor.solar_ai_effektivt_afladningsgulv
      grid_import_entity: sensor.foxessmodbus_grid_consumption
      grid_export_entity: sensor.foxessmodbus_feed_in
      ev_power_entity: sensor.solar_ai_lader_effekt
      ev_status_entity: sensor.solar_ai_ev_status
      buy_price_entity: sensor.solar_ai_indkobspris_opdeling
      sell_price_entity: sensor.battery_arbitrage_eksportpris
      savings_today_entity: sensor.solar_ai_samlet_besparelse_i_dag
      solar_forecast_entity: sensor.solar_ai_solcelleprognose_48t_graf
      solar_actual_today_entity: sensor.foxessmodbus_solar_energy_today
      prices_navigate_path: /battery-arbitrage/priser
    - type: markdown
      content: '### Settings'
    - type: custom:solar-ai-entities-card
      icon: mdi:tune
      icon_color: blue
      show_header_toggle: false
      entities:
      - entity: select.solar_ai_ev_minimum_opladningshastighed
        name: Minimum charge rate
        icon: mdi:battery-charging-low
        help: Lowest power the car charges at, whenever it charges at all. Most cars can't charge below about 6 A — don't set this below your car's own limit.
      - entity: select.solar_ai_ev_maksimum_opladningshastighed
        name: Maximum charge rate
        icon: mdi:battery-charging-high
        help: Highest power the car is allowed to draw, regardless of how much solar or grid headroom is available.
      - entity: number.solar_ai_batteri_forst_taerskel_ev_venter_til_husbatteriet_nar_dette_niveau
        name: Battery-first threshold (%)
        icon: mdi:battery-arrow-up
        help: In plain solar mode, the EV waits to charge until the house battery has reached this SoC — unless surplus power is already being exported to the grid.
      - entity: number.solar_ai_trefaset_skift_taerskel_kw
        name: Three-phase switch threshold (kW)
        icon: mdi:sine-wave
        help: Solar surplus must reach this value before the charger switches from single-phase to three-phase charging.
      - entity: number.solar_ai_faseudjaevnings_vindue_min
        name: Phase-averaging window (min)
        icon: mdi:chart-bell-curve
        help: How many minutes' rolling average of the solar surplus is used for the phase decision — dampens switching caused by passing clouds.
      - entity: select.solar_ai_stromtrin_opladning
        name: Charging current step
        icon: mdi:current-ac
        help: How finely the charger's current is adjusted to track the solar surplus (e.g. 1 A at a time, or a finer step on supported hardware).
      - entity: number.solar_ai_faseskift_interval_min
        name: Phase-switch interval (min)
        icon: mdi:timer-sync-outline
        help: How long low surplus must persist before the charger drops back to single-phase — prevents rapid back-and-forth switching.
      - entity: number.solar_ai_override_rampe_trin_s
        name: Override ramp step (s)
        icon: mdi:speedometer
        help: How often the current is raised one step when the system is actively trying to harvest otherwise-wasted solar surplus (battery full + selling blocked).
      - entity: number.solar_ai_overskuds_rampetrin_a_maks_stigning_pr_kontrol_tick_lavere_jaevnere_mindre_midlertidigt_nettraek
        name: Surplus ramp-up step (A)
        icon: mdi:trending-up
        help: "How many amps the EV's normal (non-override) target may increase by per control-loop tick (~10s). Only increases are limited — decreases always happen immediately. Lower = smoother, less transient grid draw when solar or the battery's state changes quickly; higher = grabs a new surplus faster, but can occasionally outrun what the battery/grid balance can track for a few seconds."
      - entity: select.solar_ai_standard_ev_tilstand_ved_tilslutning
        name: Default mode on connect
        help: The EV mode automatically selected every time the car is plugged into the charger.
        icon: mdi:car-connected
    - type: markdown
      content: '### Charger info'
    - type: markdown
      content: '{% set i = states.sensor.solar_ai_lader_info %}{% if i is none or i.state in [''unavailable'',''unknown'',''Unknown''] %}*Charger not connected yet*{% else %}* Vendor: **{{ i.attributes.vendor }}** · Model: **{{ i.attributes.model }}**

        * Firmware: {{ i.attributes.firmware }}

        * Sidst kontaktet: {{ i.attributes.seconds_since_seen }} sec ago{% endif %}'
    - type: custom:solar-ai-entities-card
      title: Solar forecast accuracy
      icon_color: amber
      show_header_toggle: false
      entities:
      - entity: sensor.solar_ai_solcelleprognose_fejl_nu
        name: Live solar correction
    - type: custom:solar-ai-chart-card
      title: Solar forecast (48h)
      icon: mdi:weather-partly-cloudy
      icon_color: amber
      height: 220
      x_type: timestamp
      unit: kW
      now_marker: true
      series:
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: raw_kw
        type: bar
        color: '#b0bec580'
        name: Raw (Solcast)
      - entity: sensor.solar_ai_solcelleprognose_48t_graf
        path: slots
        x: start
        y: adj_kw
        type: line
        curve: smooth
        color: var(--warning-color)
        name: Adjusted
    - type: conditional
      conditions:
      - condition: state
        entity: select.solar_ai_ev_opladningstilstand
        state_not: scheduled
      card:
        type: markdown
        content: '## ⚠️ Schedules are inactive right now

          Schedules only control charging when EV mode is "Scheduled". Current mode: {{ states(''sensor.solar_ai_ev_aktuel_tilstand'') }}. Changes here do not affect active charging — select "Scheduled" above to use the schedules.'
    - type: markdown
      content: '### Scheduled charging

        4 schedules. Enable one or more and set EV mode to "Scheduled" to use them.'
    - type: markdown
      content: '{% set slots = [1, 2, 3, 4] %}

        | # | Active | Mode | Start | End |

        |:-:|:-----:|:---------|:------|:-----|

        {% for n in slots %}{% set enabled = is_state(''switch.solar_ai_skema_'' ~ n ~ ''_aktiveret'', ''on'') %}{% set mode = states(''select.solar_ai_skema_'' ~ n ~ ''_mode'') %}{% set start = states(''time.solar_ai_skema_'' ~ n ~ ''_starttid'') %}{% set end = states(''time.solar_ai_skema_'' ~ n ~ ''_sluttid'') %}{% set mark = ''✅'' if enabled else ''⛔'' %}

        | {{ n }} | {{ mark }} | {{ mode }} | {{ start[:5] }} | {{ end[:5] }} |{% endfor %}'
