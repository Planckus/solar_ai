- title: History
  path: historik
  icon: mdi:chart-timeline-variant
  subview: true
  panel: true
  cards:
  - type: custom:mod-card
    card_mod:
      style: ':host { max-width: 1000px; margin: 0 auto; display: block; }

        '
    card:
      type: vertical-stack
      cards:
      - type: entities
        title: Savings (DKK)
        icon: mdi:cash
        show_header_toggle: false
        entities:
        - entity: sensor.solar_ai_faktisk_besparelse_i_dag
          name: Today — actual
        - entity: sensor.solar_ai_forpasset_besparelse_i_dag
          name: Today — missed
        - type: divider
        - entity: sensor.solar_ai_faktisk_besparelse_7_dage
          name: 7 days — actual
        - entity: sensor.solar_ai_forpasset_besparelse_7_dage
          name: 7 days — missed
        - type: divider
        - entity: sensor.solar_ai_faktisk_besparelse_30_dage
          name: 30 days — actual
        - entity: sensor.solar_ai_forpasset_besparelse_30_dage
          name: 30 days — missed
      - type: history-graph
        title: Battery SoC — 24 timer
        hours_to_show: 24
        entities:
        - entity: sensor.foxessmodbus_battery_soc_1
          name: SoC
      - type: history-graph
        title: Effekt — 24 timer
        hours_to_show: 24
        entities:
        - entity: sensor.foxessmodbus_battery_charge
          name: Charge
        - entity: sensor.foxessmodbus_battery_discharge
          name: Discharge
        - entity: sensor.foxessmodbus_feed_in
          name: Export
        - entity: sensor.foxessmodbus_load_power
          name: House load
      - type: history-graph
        title: Savings — 7 dage
        hours_to_show: 168
        entities:
        - entity: sensor.solar_ai_faktisk_besparelse_i_dag
          name: Actual today
        - entity: sensor.solar_ai_forpasset_besparelse_i_dag
          name: Missed today
      - type: history-graph
        title: Solar forecast accuracy
        hours_to_show: 168
        entities:
        - entity: sensor.battery_arbitrage_solcelle_prognose_nojagtighed
          name: Accuracy %
      - type: markdown
        title: Complete session log
        content: '{% set sessions = state_attr(''sensor.solar_ai_sessionslog'', ''sessions'') | default([]) %}

          {% if sessions %}

          | Start | End | Type | SoC | Duration | kWh | DKK |

          |:------|:-----|:-----|:----|:---------|:----|:----|

          {% for s in sessions[:15] %}{% set icon = ''💰'' if s.type == ''export'' else ''⚡'' %}{% set label = ''Export'' if s.type == ''export'' else ''Charge'' %}

          | {{ s.start_ts[11:16] }} | {{ s.end_ts[11:16] }} | {{ icon }} {{ label }} | {{ s.soc_start | round(0) | int }}→{{ s.soc_end | round(0) | int }}% | {{ s.duration_min }} min | {{ s.kwh }} | {{ s.dkk }} |{% endfor %}

          {% else %}

          *No sessions yet — enable Solar AI to record export and charging.*

          {% endif %}'
