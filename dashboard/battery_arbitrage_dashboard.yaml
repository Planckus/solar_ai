title: Solar AI
views:
  - title: Oversigt
    path: overview
    icon: mdi:battery-charging
    cards:

      # ── Styring ────────────────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: tile
            entity: switch.battery_arbitrage_arbitrage_aktiv
            name: Arbitrage aktiv
            color: green
            tap_action:
              action: toggle
          - type: tile
            entity: sensor.battery_arbitrage_driftstilstand
            name: Driftstilstand
            icon: mdi:sine-wave
          - type: tile
            entity: sensor.foxessmodbus_battery_soc_1
            name: Batteri SoC
            icon: mdi:battery

      - type: entity
        entity: sensor.battery_arbitrage_begrundelse_for_tilstand
        name: Beslutningsårsag
        icon: mdi:information-outline

      # ── Elpriser ───────────────────────────────────────────────────────────
      - type: entities
        title: Elpriser
        icon: mdi:currency-eur
        show_header_toggle: false
        entities:
          - entity: sensor.battery_arbitrage_eksportpris
            name: Eksportpris
          - entity: sensor.battery_arbitrage_net_arbitrage_spread
            name: Net-arbitrage spread
          - entity: number.solar_ai_minimum_arbitrage_spread
            name: Spread-grænse
          - type: divider
          - entity: sensor.battery_arbitrage_24h_prisminimum
            name: 24h prisminimum
          - entity: sensor.battery_arbitrage_24h_prismaksimum
            name: 24h prismaksimum
          - entity: sensor.battery_arbitrage_24h_prisgennemsnit
            name: 24h prisgennemsnit
          - entity: sensor.battery_arbitrage_24h_pris_25_percentil
            name: 24h pris 25. percentil
          - entity: sensor.battery_arbitrage_24h_pris_75_percentil
            name: 24h pris 75. percentil
          - entity: sensor.battery_arbitrage_naeste_slots_pris
            name: Næste slots pris

      # ── Prissammensætning ──────────────────────────────────────────────────
      # v0.37.1 — branches on sensor.solar_ai_buy_price_breakdown.mode so the
      # right line stack is shown for each buy-price source (manual / Strømligning
      # / Octopus). The VAT slider is hidden for sources where it does not apply.
      - type: markdown
        title: Prissammensætning
        content: |
          {% set bd = state_attr('sensor.solar_ai_buy_price_breakdown', 'mode') or 'manual' %}
          {% set export_fee = states('number.solar_ai_salgsgebyr_pr_kwh') | float(0) %}
          {% set export_price = states('sensor.battery_arbitrage_eksportpris') | float(0) %}
          {% set spot_ex_vat = export_price + export_fee %}
          {% set spread = states('sensor.battery_arbitrage_net_arbitrage_spread') | float(0) %}
          {% set min_spread = states('number.solar_ai_minimum_arbitrage_spread') | float(1.0) %}
          {% set price_min = states('sensor.battery_arbitrage_24h_prisminimum') | float(0) %}
          {% set price_max = states('sensor.battery_arbitrage_24h_prismaksimum') | float(0) %}
          {% set p25 = states('sensor.battery_arbitrage_24h_pris_25_percentil') | float(0) %}

          #### 📈 Salgspris (eksport)
          | | DKK/kWh |
          |:---|---:|
          | Spotpris (ekskl. moms) | {{ '%.3f' | format(spot_ex_vat) }} |
          | − Salgsgebyr | {{ '%.3f' | format(export_fee) }} |
          | **Netto eksportpris** | **{{ '%.3f' | format(export_price) }}** |

          {% if bd == 'stromligning' %}
          {% set spot = state_attr('sensor.solar_ai_buy_price_breakdown', 'spot') | float(0) %}
          {% set surc = state_attr('sensor.solar_ai_buy_price_breakdown', 'surcharge') | float(0) %}
          {% set nett = state_attr('sensor.solar_ai_buy_price_breakdown', 'net_tariff') | float(0) %}
          {% set syst = state_attr('sensor.solar_ai_buy_price_breakdown', 'system_tariff') | float(0) %}
          {% set dist = state_attr('sensor.solar_ai_buy_price_breakdown', 'distribution') | float(0) %}
          {% set elaf = state_attr('sensor.solar_ai_buy_price_breakdown', 'elafgift') | float(0) %}
          {% set sub_ex_vat = state_attr('sensor.solar_ai_buy_price_breakdown', 'subtotal_ex_vat') | float(0) %}
          {% set vat_amt = state_attr('sensor.solar_ai_buy_price_breakdown', 'vat_amount') | float(0) %}
          {% set vat_pct = state_attr('sensor.solar_ai_buy_price_breakdown', 'vat_pct') | float(0) %}
          {% set total = state_attr('sensor.solar_ai_buy_price_breakdown', 'total_inc_vat') | float(0) %}
          #### 🔌 Købspris (denne time — Strømligning)
          | | DKK/kWh |
          |:---|---:|
          | Spotpris | {{ '%.3f' | format(spot) }} |
          | + Elhandler-tillæg | {{ '%.3f' | format(surc) }} |
          | + Net-tarif (Energinet) | {{ '%.3f' | format(nett) }} |
          | + System-tarif (Energinet) | {{ '%.3f' | format(syst) }} |
          | + Distribution (DSO) | {{ '%.3f' | format(dist) }} |
          | + Elafgift | {{ '%.3f' | format(elaf) }} |
          | Subtotal (ekskl. moms) | {{ '%.3f' | format(sub_ex_vat) }} |
          | + Moms ({{ '%.2f' | format(vat_pct) }} %) | {{ '%.3f' | format(vat_amt) }} |
          | **Samlet købspris** | **{{ '%.3f' | format(total) }}** |
          *Komponentpriser fra Strømligning. Moms-slideren under Priskonfiguration er deaktiveret — Strømligning leverer momsen direkte.*
          {% elif bd == 'octopus' %}
          {% set inc = state_attr('sensor.solar_ai_buy_price_breakdown', 'value_inc_vat') | float(0) %}
          {% set ex = state_attr('sensor.solar_ai_buy_price_breakdown', 'value_exc_vat') | float(0) %}
          {% set vat_amt = state_attr('sensor.solar_ai_buy_price_breakdown', 'vat_amount') | float(0) %}
          {% set vat_pct = state_attr('sensor.solar_ai_buy_price_breakdown', 'vat_pct') | float(0) %}
          {% set vfrom = state_attr('sensor.solar_ai_buy_price_breakdown', 'valid_from') %}
          {% set vto = state_attr('sensor.solar_ai_buy_price_breakdown', 'valid_to') %}
          #### 🔌 Buy price (this slot — Octopus)
          | | GBP/kWh |
          |:---|---:|
          | Value (excl. VAT) | {{ '%.4f' | format(ex) }} |
          | + VAT ({{ '%.2f' | format(vat_pct) }} %) | {{ '%.4f' | format(vat_amt) }} |
          | **Buy price (incl. VAT)** | **{{ '%.4f' | format(inc) }}** |
          *Live tariff from Octopus Energy. The VAT slider under Priskonfiguration is disabled — VAT is taken from the Octopus API directly.*
          {% if vfrom and vto %}*Valid {{ vfrom[11:16] }}–{{ vto[11:16] }} UTC.*{% endif %}
          {% else %}
          {% set spot_markup = states('number.solar_ai_spotpris_tillaeg_elhandlertillaeg') | float(0) %}
          {% set tariff_total = states('sensor.solar_ai_nettarif_denne_time') | float(0) %}
          {% set elafgift = states('number.solar_ai_elafgift_dkk_kwh') | float(0) %}
          {% set network_tariff = tariff_total - elafgift %}
          {% set vat_pct = states('number.solar_ai_moms_pa_kob') | float(25) %}
          {% set vat_factor = 1 + vat_pct / 100 %}
          {% set pretax_buy = spot_ex_vat + spot_markup + tariff_total %}
          {% set total_buy = pretax_buy * vat_factor %}
          #### 🔌 Købspris (denne time)
          | | DKK/kWh |
          |:---|---:|
          | Spotpris (ekskl. moms) | {{ '%.3f' | format(spot_ex_vat) }} |
          | + Spotpris-tillæg | {{ '%.3f' | format(spot_markup) }} |
          | + Nettarif (DSO + Energinet) | {{ '%.3f' | format(network_tariff) }} |
          | + Elafgift | {{ '%.3f' | format(elafgift) }} |
          | Subtotal (ekskl. moms) | {{ '%.3f' | format(pretax_buy) }} |
          | + Moms ({{ vat_pct | int }} %) | {{ '%.3f' | format(pretax_buy * vat_pct / 100) }} |
          | **Samlet købspris** | **{{ '%.3f' | format(total_buy) }}** |
          {% endif %}

          #### ⚖️ Arbitrage-spread
          **{{ '%.3f' | format(spread) }} DKK/kWh** {% if spread >= min_spread %}✅ over grænse ({{ '%.2f' | format(min_spread) }}){% else %}⛔ under grænse ({{ '%.2f' | format(min_spread) }}){% endif %}

          *24h spotinterval: {{ '%.3f' | format(price_min) }}–{{ '%.3f' | format(price_max) }} DKK/kWh · p25: {{ '%.3f' | format(p25) }} DKK/kWh*

      # ── Priskonfiguration ──────────────────────────────────────────────────
      - type: entities
        title: Priskonfiguration
        icon: mdi:tune
        show_header_toggle: false
        entities:
          - entity: number.solar_ai_spotpris_tillaeg_elhandlertillaeg
            name: Spotpris-tillæg (elhandler)
          - entity: number.solar_ai_elafgift_dkk_kwh
            name: Elafgift
          - entity: number.solar_ai_moms_pa_kob
            name: Moms på køb
          - type: divider
          - entity: number.solar_ai_salgsgebyr_pr_kwh
            name: Salgsgebyr (ved salg)
          - type: divider
          - entity: sensor.solar_ai_nettarif_denne_time
            name: Nettarif denne time

      # ── Net ────────────────────────────────────────────────────────────────
      - type: entities
        title: Net
        icon: mdi:transmission-tower
        show_header_toggle: false
        entities:
          - entity: number.solar_ai_net_importgraense
            name: Sikringsstørrelse
          - type: divider
          - entity: sensor.solar_ai_net_importeffekt
            name: Aktuelt netimport
          - entity: sensor.solar_ai_net_raderum
            name: Råderum til grænse

      # ── Solcelleprognose ───────────────────────────────────────────────────
      - type: entities
        title: Solcelleprognose
        icon: mdi:solar-power
        show_header_toggle: false
        entities:
          - entity: sensor.battery_arbitrage_solcelle_prognose_nojagtighed
            name: Prognose-nøjagtighed
          - type: divider
          - entity: sensor.battery_arbitrage_solcelle_prognose_24h
            name: Rå 24h
          - entity: sensor.battery_arbitrage_solcelle_prognose_24h_justeret
            name: Justeret 24h
          - entity: sensor.battery_arbitrage_solcelle_prognose_6h
            name: Rå 6h
          - entity: sensor.battery_arbitrage_solcelle_prognose_6h_justeret
            name: Justeret 6h
          - type: divider
          - entity: binary_sensor.battery_arbitrage_sol_fylder_batteri
            name: Sol fylder batteri

      # ── Batteri ────────────────────────────────────────────────────────────
      - type: entities
        title: Batteri
        icon: mdi:battery-charging
        show_header_toggle: false
        entities:
          - entity: sensor.foxessmodbus_battery_soc_1
            name: Ladetilstand
          - entity: number.solar_ai_minimum_soc_eksport
            name: Min. SoC (eksport)
          - entity: number.solar_ai_maksimum_soc_netopladning
            name: Maks. SoC (netopladning)
          - entity: sensor.battery_arbitrage_eksporterbar_energi
            name: Eksporterbar energi
          - entity: sensor.battery_arbitrage_importerbar_energi
            name: Importerbar energi
          - entity: sensor.battery_arbitrage_tid_til_fuld_opladning
            name: Tid til fuld opladning
          - type: divider
          - entity: sensor.foxessmodbus_battery_charge
            name: Opladningseffekt
          - entity: sensor.foxessmodbus_battery_discharge
            name: Afladningseffekt
          - entity: sensor.battery_arbitrage_batteritemperatur_laveste_celle
            name: Celletemperatur (laveste)

      # ── Betingelser ────────────────────────────────────────────────────────
      - type: glance
        title: Betingelser
        show_state: true
        entities:
          - entity: binary_sensor.battery_arbitrage_bor_eksportere
            name: Bør eksportere
          - entity: binary_sensor.battery_arbitrage_bor_net_oplade
            name: Bør netoplade
          - entity: binary_sensor.battery_arbitrage_tilstedevaerelse
            name: Hjemme
          - entity: sensor.battery_arbitrage_evcc_batteritilstand
            name: EVCC-tilstand

      # ── EV-status ──────────────────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: heading
            heading: EV-status
            icon: mdi:car-electric
          - type: horizontal-stack
            cards:
              - type: tile
                entity: binary_sensor.battery_arbitrage_ev_tilsluttet
                name: EV tilsluttet
                color: green
              - type: tile
                entity: binary_sensor.solar_ai_ev_oplader_solenergi
                name: EV på solenergi
                color: green
                state_content: charge_kw
              - type: tile
                entity: binary_sensor.battery_arbitrage_ev_oplader_now_minpv_tilstand
                name: EV på netstrøm
                color: green
                state_content: charge_kw

      # ── Besparelser ────────────────────────────────────────────────────────
      - type: entities
        title: Besparelser (DKK)
        icon: mdi:cash
        show_header_toggle: false
        entities:
          - entity: sensor.solar_ai_faktisk_besparelse_i_dag
            name: "I dag — faktisk"
          - entity: sensor.solar_ai_forpasset_besparelse_i_dag
            name: "I dag — forpasset (deaktiveret)"
          - type: divider
          - entity: sensor.solar_ai_faktisk_besparelse_7_dage
            name: "7 dage — faktisk"
          - entity: sensor.solar_ai_forpasset_besparelse_7_dage
            name: "7 dage — forpasset (deaktiveret)"
          - type: divider
          - entity: sensor.solar_ai_faktisk_besparelse_30_dage
            name: "30 dage — faktisk"
          - entity: sensor.solar_ai_forpasset_besparelse_30_dage
            name: "30 dage — forpasset (deaktiveret)"

      # ── Forbrugsmodel ──────────────────────────────────────────────────────
      - type: entities
        title: Forbrugsmodel
        icon: mdi:home-lightning-bolt
        show_header_toggle: false
        entities:
          - entity: sensor.battery_arbitrage_husstand_forbrug_2h_gennemsnit
            name: Husforbrug 2h-gennemsnit
          - entity: sensor.battery_arbitrage_husstand_forbrug_28_dages_gennemsnit
            name: Husforbrug 28-dages gennemsnit
          - entity: sensor.battery_arbitrage_forudsagt_husstand_forbrug_24h
            name: Forudsagt husforbrug 24h
          - entity: sensor.foxessmodbus_load_power
            name: Aktuelt husforbrug

      # ── Lærte opladningshastigheder ────────────────────────────────────────
      - type: entities
        title: Lærte opladningshastigheder
        icon: mdi:thermometer-lines
        show_header_toggle: false
        entities:
          - entity: sensor.battery_arbitrage_laert_opladningshastighed_aktuel_temp
            name: Opladningshastighed (aktuel temp.)
          - type: divider
          - entity: sensor.battery_arbitrage_laert_opladningshastighed_under_0degc
            name: "Hastighed — under 0 °C"
          - entity: sensor.solar_ai_laert_opladningshastighed_0_5degc
            name: "Hastighed — 0–5 °C"
          - entity: sensor.solar_ai_laert_opladningshastighed_6_15degc
            name: "Hastighed — 6–15 °C"
          - entity: sensor.solar_ai_laert_opladningshastighed_16_21degc
            name: "Hastighed — 16–21 °C"
          - entity: sensor.solar_ai_laert_opladningshastighed_21_35degc
            name: "Hastighed — 21–35 °C"
          - entity: sensor.solar_ai_laert_opladningshastighed_35_50degc
            name: "Hastighed — 35–50 °C"
          - entity: sensor.solar_ai_laert_opladningshastighed_over_50degc
            name: "Hastighed — over 50 °C"

      # ── FoxESS-inverter ────────────────────────────────────────────────────
      - type: entities
        title: FoxESS-inverter
        icon: mdi:solar-panel
        show_header_toggle: false
        entities:
          - entity: select.foxessmodbus_work_mode
            name: Driftstilstand
          - entity: sensor.foxessmodbus_feed_in
            name: Indspejlingseffekt
          - entity: sensor.foxessmodbus_load_power
            name: Forbrugseffekt
